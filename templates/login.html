{% extends 'base.html' %}

{% block title %}
Admin Login - Gen X Cafe
{% endblock %}

{% block content %}

<section class="page-hero">

    <div class="container text-center">

        <h1 class="page-hero-title">
            Admin Login
        </h1>

        <p>
            Secure access to dashboard
        </p>

    </div>

</section>

<section class="section-pad">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="menu-card p-5">

                    <div class="text-center mb-4">

                        <div class="display-3 mb-3">
                            ☕
                        </div>

                        <h2>
                            Welcome Back
                        </h2>

                        <p class="text-muted">
                            Login to manage Gen X Cafe
                        </p>

                    </div>

                    <form method="POST">

                        <div class="mb-4">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100 btn-lg">

                            Login

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <small class="text-muted">

                            Default Admin:
                            admin@genxcafe.com

                        </small>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
