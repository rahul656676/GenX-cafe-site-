{% extends 'base.html' %}

{% block title %}
Reserve Table - Gen X Cafe
{% endblock %}

{% block content %}

<section class="page-hero">

    <div class="container text-center">

        <h1 class="page-hero-title">
            Reserve Your Table
        </h1>

        <p>
            Book your perfect coffee experience
        </p>

    </div>

</section>

<section class="section-pad">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="menu-card p-4">

                    <form method="POST">

                        <div class="row g-4">

                            <div class="col-md-6">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text"
                                       name="name"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input type="text"
                                       name="phone"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Number of Guests
                                </label>

                                <select name="guests"
                                        class="form-select">

                                    <option value="1">1 Guest</option>
                                    <option value="2">2 Guests</option>
                                    <option value="3">3 Guests</option>
                                    <option value="4">4 Guests</option>
                                    <option value="5">5 Guests</option>
                                    <option value="6">6+ Guests</option>

                                </select>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Booking Date
                                </label>

                                <input type="date"
                                       name="date"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Time Slot
                                </label>

                                <input type="time"
                                       name="time"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="col-12">

                                <label class="form-label">
                                    Special Request
                                </label>

                                <textarea name="special_request"
                                          rows="4"
                                          class="form-control"
                                          placeholder="Birthday setup, window seat, etc"></textarea>

                            </div>

                            <div class="col-12 text-center">

                                <button type="submit"
                                        class="btn btn-primary btn-lg px-5">

                                    Reserve Table

                                </button>

                            </div>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
